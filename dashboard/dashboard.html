<!DOCTYPE html>
<html>
<head>
<title>YouTube Comment Insights</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

input{
padding:10px;
width:400px;
}

button{
padding:10px 20px;
margin-left:10px;
}

#chart{
width:400px;
margin:auto;
}
</style>
</head>

<body>

<h1>YouTube Comment Insights</h1>

<input id="url" placeholder="Paste YouTube video URL">

<button onclick="analyze()">Analyze</button>

<br><br>

<canvas id="chart"></canvas>

<script>

async function analyze(){

const url=document.getElementById("url").value

const response=await fetch("http://18.205.239.142:5000/analyze",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({url:url})
})

const data=await response.json()

const ctx=document.getElementById('chart')

new Chart(ctx,{
type:'pie',
data:{
labels:['Positive','Negative','Neutral'],
datasets:[{
data:[
data.positive,
data.negative,
data.neutral
],
backgroundColor:[
'#22c55e',
'#ef4444',
'#facc15'
]
}]
}
})

}

</script>

</body>
</html>
